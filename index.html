<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bolus Calc</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1D9E75">
</head>
<body>
    <div class="container">
        <header><h1>Bolus Calc</h1></header>

        <!-- BG Input -->
        <section class="card">
            <div class="field">
                <label for="currentBg">Current BG</label>
                <input type="text" id="currentBg" inputmode="decimal" placeholder="0" autofocus>
                <span class="sum-badge" id="bgSum"></span>
            </div>
        </section>

        <!-- Carb Input with Sum Badge + Plus Button -->
        <section class="card">
            <div class="field">
                <label for="carbs">Carbs <span class="hint">use + to add up, e.g. 5+3+10</span></label>
                <div class="input-with-btn">
                    <input type="text" id="carbs" inputmode="decimal" placeholder="0">
                    <button type="button" id="carbsPlusBtn" class="plus-btn" aria-label="Append plus">+</button>
                </div>
                <span class="sum-badge" id="carbsSum"></span>
            </div>
        </section>

        <!-- IOB Section -->
        <section class="card">
            <label class="section-label">Insulin On Board (IOB)</label>
            <div class="iob-toggle">
                <input type="radio" name="iobMode" id="iobAuto" value="auto" checked>
                <label for="iobAuto">Auto</label>
                <input type="radio" name="iobMode" id="iobManual" value="manual">
                <label for="iobManual">Manual</label>
            </div>
            <div id="iobAutoPanel" class="iob-panel">
                <div class="iob-value">
                    <span>From history:</span>
                    <strong id="iobValueAuto">0.00 u</strong>
                </div>
            </div>
            <div id="iobManualPanel" class="iob-panel" style="display:none;">
                <div class="field-row">
                    <div class="field-half">
                        <label for="manualUnits">Units given</label>
                        <input type="number" id="manualUnits" inputmode="decimal" step="0.5" placeholder="0">
                    </div>
                    <div class="field-half">
                        <label for="manualHoursAgo">Hours ago</label>
                        <input type="number" id="manualHoursAgo" inputmode="decimal" step="0.5" placeholder="0">
                    </div>
                </div>
                <div class="iob-value">
                    <span>Remaining:</span>
                    <strong id="iobValueManual">0.00 u</strong>
                </div>
            </div>
        </section>

        <!-- Ratio Results (centerpiece) -->
        <section class="card results-card">
            <label class="section-label">Bolus by Ratio</label>
            <div class="ratio-header">
                <span class="ratio-col-label">Ratio</span>
                <span class="ratio-col-label">Carb</span>
                <span class="ratio-col-label">Corr</span>
                <span class="ratio-col-label">Total</span>
                <span class="ratio-col-label ratio-col-action"></span>
            </div>
            <div id="ratioResults"></div>
            <button id="addRatioBtn" class="add-ratio-btn">+ Add Ratio</button>
        </section>

        <!-- Settings (collapsible) -->
        <details class="card settings-card">
            <summary>Settings</summary>
            <div class="settings-grid">
                <div class="field">
                    <label for="targetBg">Target BG</label>
                    <input type="number" id="targetBg" inputmode="decimal" step="0.1">
                </div>
                <div class="field">
                    <label for="isf">ISF</label>
                    <input type="number" id="isf" inputmode="decimal" step="0.1">
                </div>
                <div class="field">
                    <label for="dia">DIA (hours)</label>
                    <input type="number" id="dia" inputmode="decimal" step="0.5" value="4">
                </div>
            </div>
        </details>

        <!-- History + Log -->
        <section class="card">
            <label class="section-label">Recent Boluses</label>
            <div id="historyList"></div>
            <button id="addBolusBtn" class="log-btn">Log This Bolus</button>
        </section>

        <footer>
            <button id="resetBtn" class="reset-button">Clear All</button>
            <p class="disclaimer">Calculation aid only. Not medical advice.</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
